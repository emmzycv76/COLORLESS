<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Colorless - Editor</title>
  <style>
    body { 
      margin:0; font-family: Arial; background: #111; color: white; 
    }
    .top-bar { 
      display:flex; justify-content:space-between; align-items:center; 
      padding:10px; background:#1a1a1a; position:sticky; top:0; z-index:100; 
    }
    .bottom-toolbar { 
      position:fixed; bottom:0; left:0; right:0; 
      background:#1a1a1a; padding:12px; 
      display:flex; justify-content:center; gap:10px; 
      z-index:103; border-top:1px solid #333; 
    }
    .grid-controls { 
      position:fixed; bottom:70px; left:0; right:0; 
      background:rgba(26, 26, 26, 0.70); 
      padding:12px 15px; 
      display: none; 
      z-index:102; 
      border-top:1px solid rgba(255,255,255,0.1); 
    }
    .image-container { 
      position:relative; 
      display:flex; 
      justify-content:center; 
      align-items:center; 
      max-width:100%; 
      max-height: calc(100vh - 245px); 
      margin: 15px auto; 
      padding: 0 10px; 
      overflow: hidden; 
      background: #111; 
    }
    img, canvas { 
      max-width: 100%; 
      max-height: calc(100vh - 245px); 
      border:2px solid #fff; 
      border-radius:12px; 
      cursor: crosshair; 
      object-fit: contain; 
    }
    .grid-canvas { 
      position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; 
    }

    button { 
      padding:10px 18px; font-size:15px; border:none; border-radius:50px; 
      background:#ff4d4d; color:white; cursor:pointer; display:flex; align-items:center; gap:6px; 
    }
    button:hover { background:#ff6666; }

    .info { 
      padding:10px; background:#222; margin:12px; border-radius:12px; 
      text-align:center; display: none; 
    }
    .color-swatch { width:55px; height:55px; margin:8px auto; border:3px solid white; border-radius:10px; }
  </style>
</head>
<body>
  <!-- Top Bar -->
  <div class="top-bar">
    <button onclick="backToHome()">← Back</button>
    <button onclick="downloadImage()">⬇️ with grid</button>
  </div>

  <div class="image-container">
    <img id="editorImage" onclick="pickColor(event)">
    <canvas id="gridCanvas" class="grid-canvas" style="display:none;"></canvas>
  </div>

  <!-- Color Info -->
  <div id="colorInfo" class="info">
    <div id="colorBox" class="color-swatch"></div>
    <h3 id="hex">#------</h3>
    <p id="rgb">RGB: ---</p>
    <p id="name">Color: ---</p>
    <button onclick="hideColorInfo()">Close</button>
  </div>

  <!-- Grid Controls -->
  <div id="gridControls" class="grid-controls">
    <div style="display:flex; justify-content:space-between; font-size:13px; margin-bottom:6px;">
      <span>Vertical Lines: <span id="vValue">20</span></span>
      <span>Horizontal Lines: <span id="hValue">20</span></span>
    </div>
    <input type="range" id="vSlider" min="4" max="100" value="20" oninput="updateGrid()" style="width:100%; margin-bottom:8px;">
    <input type="range" id="hSlider" min="4" max="100" value="20" oninput="updateGrid()" style="width:100%; margin-bottom:12px;">

    <label style="font-size:13px; display:block; margin-bottom:6px;">Grid Color</label>
    <div id="gridColorPalette" style="display:flex; gap:8px; flex-wrap:wrap;"></div>

    <!-- Smaller Hide Button -->
    <button id="hideBtn" 
            style="margin-top:12px; background:#333; width:100%; font-size:14px; padding:8px;"
            onmousedown="hideControls(true)" 
            onmouseup="hideControls(false)"
            ontouchstart="hideControls(true)"
            ontouchend="hideControls(false)">
      Hide Controls
    </button>
  </div>

  <!-- Bottom Toolbar -->
  <div class="bottom-toolbar">
    <button onclick="toggleGrid()">🗼 Grid</button>
    <button onclick="startCrop()">✂️ Crop</button>
    <button onclick="activateColorPicker()">🎨 Color ID</button>
  </div>

  <script>
    let gridEnabled = false;
    let vLines = 20;
    let hLines = 20;
    let gridColor = '#000000';
    let isColorPickerActive = false;

    const img = document.getElementById('editorImage');
    const gridCanvas = document.getElementById('gridCanvas');
    const ctxGrid = gridCanvas.getContext('2d');
    const tempCanvas = document.createElement('canvas');
    const tempCtx = tempCanvas.getContext('2d');

    // Grid Color Palette
    const gridColors = ['#000000', '#FFFFFF', '#FF0000', '#FFFF00', '#00FF00', '#0000FF', '#FF00FF', '#FFA500', '#808080'];
    const colorPalette = document.getElementById('gridColorPalette');
    gridColors.forEach(hex => {
      const sw = document.createElement('div');
      sw.style.width = '28px';
      sw.style.height = '28px';
      sw.style.background = hex;
      sw.style.border = '2px solid white';
      sw.style.borderRadius = '6px';
      sw.style.cursor = 'pointer';
      sw.onclick = () => {
        gridColor = hex;
        if (gridEnabled) drawGrid();
      };
      colorPalette.appendChild(sw);
    });

    function loadImage() {
      const saved = localStorage.getItem('colorlessImage');
      if (saved) img.src = saved;
      else backToHome();
    }

    img.onload = () => {
      if (gridEnabled) drawGrid();
    };

    function activateColorPicker() {
      isColorPickerActive = true;
      alert("🎨 Tap on the image to pick a color");
    }

    function pickColor(e) {
      if (!isColorPickerActive) return;
      isColorPickerActive = false;

      tempCanvas.width = img.naturalWidth || img.width;
      tempCanvas.height = img.naturalHeight || img.height;
      tempCtx.drawImage(img, 0, 0);

      const rect = img.getBoundingClientRect();
      const scaleX = (img.naturalWidth || img.width) / rect.width;
      const scaleY = (img.naturalHeight || img.height) / rect.height;

      const x = Math.floor((e.clientX - rect.left) * scaleX);
      const y = Math.floor((e.clientY - rect.top) * scaleY);

      const pixel = tempCtx.getImageData(x, y, 1, 1).data;
      const r = pixel[0], g = pixel[1], b = pixel[2];
      const hex = '#' + [r,g,b].map(n => n.toString(16).padStart(2,'0')).join('').toUpperCase();

      document.getElementById('colorBox').style.backgroundColor = hex;
      document.getElementById('hex').textContent = hex;
      document.getElementById('rgb').textContent = `RGB: ${r}, ${g}, ${b}`;
      document.getElementById('name').textContent = `Color: ${getColorName(r, g, b)}`;
      document.getElementById('colorInfo').style.display = 'block';
    }

    function getColorName(r, g, b) {
      if (r > 200 && g < 110 && b < 110) return "Red";
      if (g > 180 && r < 120 && b < 120) return "Green";
      if (b > 180 && r < 120 && g < 120) return "Blue";
      if (r > 200 && g > 170 && b < 100) return "Yellow";
      if (r > 160 && g < 100 && b > 140) return "Purple";
      if (r > 200 && g > 100 && b < 80) return "Orange";
      if (r < 60 && g < 60 && b < 60) return "Black";
      if (r > 220 && g > 220 && b > 220) return "White";
      return "Custom Color";
    }

    function hideColorInfo() {
      document.getElementById('colorInfo').style.display = 'none';
    }

    function toggleGrid() {
      gridEnabled = !gridEnabled;
      gridCanvas.style.display = gridEnabled ? 'block' : 'none';
      document.getElementById('gridControls').style.display = gridEnabled ? 'block' : 'none';
      if (gridEnabled) drawGrid();
    }

    function updateGrid() {
      vLines = parseInt(document.getElementById('vSlider').value);
      hLines = parseInt(document.getElementById('hSlider').value);
      document.getElementById('vValue').textContent = vLines;
      document.getElementById('hValue').textContent = hLines;
      if (gridEnabled) drawGrid();
    }

    function drawGrid() {
      gridCanvas.width = img.clientWidth;
      gridCanvas.height = img.clientHeight;
      ctxGrid.clearRect(0, 0, gridCanvas.width, gridCanvas.height);
      ctxGrid.strokeStyle = gridColor;
      ctxGrid.lineWidth = 1.5;

      for (let i = 1; i < vLines; i++) {
        const x = (gridCanvas.width / vLines) * i;
        ctxGrid.beginPath(); ctxGrid.moveTo(x, 0); ctxGrid.lineTo(x, gridCanvas.height); ctxGrid.stroke();
      }
      for (let i = 1; i < hLines; i++) {
        const y = (gridCanvas.height / hLines) * i;
        ctxGrid.beginPath(); ctxGrid.moveTo(0, y); ctxGrid.lineTo(gridCanvas.width, y); ctxGrid.stroke();
      }
    }

    function downloadImage() {
      const w = img.naturalWidth || img.width;
      const h = img.naturalHeight || img.height;

      tempCanvas.width = w;
      tempCanvas.height = h;
      tempCtx.drawImage(img, 0, 0, w, h);

      if (gridEnabled) {
        const gridTemp = document.createElement('canvas');
        gridTemp.width = w;
        gridTemp.height = h;
        const gCtx = gridTemp.getContext('2d');
        gCtx.strokeStyle = gridColor;
        gCtx.lineWidth = 2;

        for (let i = 1; i < vLines; i++) {
          const x = (w / vLines) * i;
          gCtx.beginPath(); gCtx.moveTo(x, 0); gCtx.lineTo(x, h); gCtx.stroke();
        }
        for (let i = 1; i < hLines; i++) {
          const y = (h / hLines) * i;
          gCtx.beginPath(); gCtx.moveTo(0, y); gCtx.lineTo(w, y); gCtx.stroke();
        }
        tempCtx.drawImage(gridTemp, 0, 0);
      }

      const link = document.createElement('a');
      link.download = 'colorless-with-grid.png';
      link.href = tempCanvas.toDataURL('image/png');
      link.click();
    }

    function startCrop() {
      alert("✂️ Crop mode: Click and drag on the image");
    }

    function hideControls(hide) {
      document.getElementById('gridControls').style.opacity = hide ? '0.15' : '1';
    }

    function backToHome() {
      localStorage.removeItem('colorlessImage');
      window.location.href = 'index.html';
    }

    loadImage();
  </script>
</body>
</html>
