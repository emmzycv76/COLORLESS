<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Colorless - Editor</title>
  <style>
    body { margin:0; font-family: Arial; background: #111; color: white; }
    .header { display:flex; justify-content:space-between; align-items:center; padding:10px; background:#1a1a1a; position:sticky; top:0; z-index:100; }
    .container { position:relative; display:inline-block; max-width:600px; margin:20px auto; display:block; }
    img, canvas { width:100%; border:2px solid #fff; border-radius:12px; cursor: crosshair; }
    .grid-canvas { position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; }
    
    .controls { 
      padding:12px; background:#1a1a1a; margin:10px; border-radius:12px; 
      display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; 
    }
    button { 
      padding:10px 16px; font-size:14px; border:none; border-radius:50px; 
      background:#ff4d4d; color:white; cursor:pointer; display:flex; align-items:center; gap:6px; 
    }
    button:hover { background:#ff6666; }

    .info { 
      padding:12px; background:#222; margin:10px; border-radius:12px; 
      text-align:center; display: none; 
    }
    .color-swatch { width:60px; height:60px; margin:8px auto; border:3px solid white; border-radius:10px; }
    .grid-controls { display: none; margin-top: 8px; width: 100%; }
  </style>
</head>
<body>
  <div class="header">
    <button onclick="backToHome()">← Back</button>
    <h2>Editor</h2>
    <button onclick="downloadImage()">⬇️ Download</button>
  </div>

  <div class="container">
    <img id="editorImage" onclick="pickColor(event)">
    <canvas id="gridCanvas" class="grid-canvas" style="display:none;"></canvas>
  </div>

  <!-- Color Info Box -->
  <div id="colorInfo" class="info">
    <div id="colorBox" class="color-swatch"></div>
    <h3 id="hex">#------</h3>
    <p id="rgb">RGB: ---</p>
    <p id="name">Color: ---</p>
    <button onclick="hideColorInfo()">Close</button>
  </div>

  <div class="controls">
    <button onclick="toggleGrid()">🗼 Grid</button>
    <button onclick="startCrop()">✂️ Crop</button>
    <button onclick="activateColorPicker()">🎨 Color ID</button>

    <div id="gridControls" class="grid-controls">
      <label>Vertical: <span id="vValue">20</span></label>
      <input type="range" id="vSlider" min="4" max="100" value="20" oninput="updateGrid()">
      <label>Horizontal: <span id="hValue">20</span></label>
      <input type="range" id="hSlider" min="4" max="100" value="20" oninput="updateGrid()">
    </div>
  </div>

  <script>
    let gridEnabled = false;
    let vLines = 20, hLines = 20;
    let isColorPickerActive = false;

    const img = document.getElementById('editorImage');
    const gridCanvas = document.getElementById('gridCanvas');
    const ctxGrid = gridCanvas.getContext('2d');
    const tempCanvas = document.createElement('canvas');
    const tempCtx = tempCanvas.getContext('2d');

    function loadImage() {
      const saved = localStorage.getItem('colorlessImage');
      if (saved) img.src = saved;
      else backToHome();
    }

    // ==================== COLOR ID ====================
    function activateColorPicker() {
      isColorPickerActive = true;
      alert("🎨 Color ID activated!\nTap on the image to pick a color.");
    }

    function pickColor(e) {
      if (!isColorPickerActive) return;

      tempCanvas.width = img.width;
      tempCanvas.height = img.height;
      tempCtx.drawImage(img, 0, 0);

      const rect = img.getBoundingClientRect();
      const x = Math.floor((e.clientX - rect.left) * (img.width / rect.width));
      const y = Math.floor((e.clientY - rect.top) * (img.height / rect.height));

      const pixel = tempCtx.getImageData(x, y, 1, 1).data;
      const r = pixel[0], g = pixel[1], b = pixel[2];
      const hex = '#' + [r,g,b].map(n => n.toString(16).padStart(2,'0')).join('').toUpperCase();

      document.getElementById('colorBox').style.backgroundColor = hex;
      document.getElementById('hex').textContent = hex;
      document.getElementById('rgb').textContent = `RGB: ${r}, ${g}, ${b}`;
      document.getElementById('name').textContent = `Color: ${getColorName(r,g,b)}`;
      
      document.getElementById('colorInfo').style.display = 'block';
      isColorPickerActive = false; // Turn off after one pick
    }

    function getColorName(r, g, b) {
      if (r > 200 && g < 110 && b < 110) return "Red";
      if (g > 180 && r < 120 && b < 120) return "Green";
      if (b > 180 && r < 120 && g < 120) return "Blue";
      if (r > 200 && g > 170 && b < 100) return "Yellow";
      if (r > 160 && g < 100 && b > 140) return "Purple";
      if (r > 200 && g > 100 && b < 80) return "Orange";
      if (r < 60 && g < 60 && b < 60) return "Black";
      if (r > 220 && g > 220 && b > 220) return "White";
      return "Custom Color";
    }

    function hideColorInfo() {
      document.getElementById('colorInfo').style.display = 'none';
    }

    // ==================== GRID ====================
    function toggleGrid() {
      gridEnabled = !gridEnabled;
      gridCanvas.style.display = gridEnabled ? 'block' : 'none';
      document.getElementById('gridControls').style.display = gridEnabled ? 'block' : 'none';
      if (gridEnabled) drawGrid();
    }

    function updateGrid() {
      vLines = parseInt(document.getElementById('vSlider').value);
      hLines = parseInt(document.getElementById('hSlider').value);
      document.getElementById('vValue').textContent = vLines;
      document.getElementById('hValue').textContent = hLines;
      if (gridEnabled) drawGrid();
    }

    function drawGrid() {
      gridCanvas.width = img.width;
      gridCanvas.height = img.height;
      ctxGrid.clearRect(0, 0, gridCanvas.width, gridCanvas.height);
      ctxGrid.strokeStyle = '#000000';
      ctxGrid.lineWidth = 1;

      for (let i = 1; i < vLines; i++) {
        const x = (gridCanvas.width / vLines) * i;
        ctxGrid.beginPath(); ctxGrid.moveTo(x, 0); ctxGrid.lineTo(x, gridCanvas.height); ctxGrid.stroke();
      }
      for (let i = 1; i < hLines; i++) {
        const y = (gridCanvas.height / hLines) * i;
        ctxGrid.beginPath(); ctxGrid.moveTo(0, y); ctxGrid.lineTo(gridCanvas.width, y); ctxGrid.stroke();
      }
    }

    // ==================== CROP ====================
    let isCropping = false;
    let startX, startY, endX, endY;

    function startCrop() {
      isCropping = true;
      alert("✂️ Crop mode ON\nClick and drag on the image to select area.\n(Release to crop)");
    }

    img.addEventListener('mousedown', e => {
      if (!isCropping) return;
      const rect = img.getBoundingClientRect();
      startX = (e.clientX - rect.left) * (img.width / rect.width);
      startY = (e.clientY - rect.top) * (img.height / rect.height);
    });

    img.addEventListener('mouseup', e => {
      if (!isCropping) return;
      const rect = img.getBoundingClientRect();
      endX = (e.clientX - rect.left) * (img.width / rect.width);
      endY = (e.clientY - rect.top) * (img.height / rect.height);

      performCrop();
      isCropping = false;
    });

    function performCrop() {
      const width = Math.abs(endX - startX);
      const height = Math.abs(endY - startY);
      const x = Math.min(startX, endX);
      const y = Math.min(startY, endY);

      if (width < 10 || height < 10) {
        alert("Selection too small!");
        return;
      }

      tempCanvas.width = width;
      tempCanvas.height = height;
      tempCtx.drawImage(img, x, y, width, height, 0, 0, width, height);

      // Replace image with cropped version
      img.src = tempCanvas.toDataURL('image/png');
      alert("✅ Image cropped successfully!");
    }

    function downloadImage() {
      tempCanvas.width = img.naturalWidth || img.width;
      tempCanvas.height = img.naturalHeight || img.height;
      tempCtx.drawImage(img, 0, 0);
      if (gridEnabled) tempCtx.drawImage(gridCanvas, 0, 0);

      const link = document.createElement('a');
      link.download = 'colorless-edited.png';
      link.href = tempCanvas.toDataURL('image/png');
      link.click();
    }

    function backToHome() {
      localStorage.removeItem('colorlessImage');
      window.location.href = 'index.html';
    }

    // Initialize
    loadImage();
  </script>
</body>
</html>
