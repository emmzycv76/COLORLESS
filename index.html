<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ChromaArt - Color ID</title>
  <style>
    body { margin:0; font-family: Arial; background: #111; color: white; text-align:center; }
    video, canvas { width:100%; max-width:600px; border:2px solid #fff; border-radius:12px; }
    .info { padding:15px; background:#222; margin:10px; border-radius:12px; }
    button { padding:15px 25px; margin:10px; font-size:18px; border:none; border-radius:50px; background:#ff4d4d; color:white; }
    .color-box { width:80px; height:80px; margin:10px auto; border:3px solid white; border-radius:12px; }
  </style>
</head>
<body>
  <h1>🎨 ChromaArt</h1>
  <p>Color Identifier for Artists</p>

  <video id="video" autoplay playsinline></video>
  <canvas id="canvas" style="display:none;"></canvas>

  <div class="info">
    <div id="colorBox" class="color-box"></div>
    <h2 id="hex">#------</h2>
    <p id="rgb">RGB: ---</p>
    <p id="name">Color Name: ---</p>
  </div>

  <button onclick="captureColor()">📸 Pick Color</button>
  <button onclick="startCamera()">Restart Camera</button>

  <script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    function startCamera() {
      navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
        .then(stream => { video.srcObject = stream; })
        .catch(err => alert("Camera error: " + err));
    }

    function captureColor() {
      canvas.width = video.videoWidth || 640;
      canvas.height = video.videoHeight || 480;
      ctx.drawImage(video, 0, 0);

      const x = Math.floor(canvas.width / 2);
      const y = Math.floor(canvas.height / 2);
      const pixel = ctx.getImageData(x, y, 1, 1).data;
      
      const r = pixel[0], g = pixel[1], b = pixel[2];
      const hex = '#' + ((1 << 24) + (r << 16) + (g << 8) + b).toString(16).slice(1).toUpperCase();

      document.getElementById('colorBox').style.backgroundColor = hex;
      document.getElementById('hex').textContent = hex;
      document.getElementById('rgb').textContent = `RGB: ${r}, ${g}, ${b}`;

      let name = "Custom Color";
      if (r > 200 && g < 100 && b < 100) name = "Red";
      else if (g > 180 && r < 100 && b < 100) name = "Green";
      else if (b > 180 && r < 100 && g < 100) name = "Blue";
      else if (r > 200 && g > 200 && b < 100) name = "Yellow";
      else if (r > 150 && g < 100 && b > 150) name = "Purple";
      
      document.getElementById('name').textContent = "Color: " + name;
    }

    window.onload = startCamera;
  </script>
</body>
</html>
