<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Colorless</title>
  <style>
    body { margin:0; font-family: Arial; background: #111; color: white; text-align:center; padding:10px; }
    .header { display:flex; justify-content:space-between; align-items:center; padding:10px; background:#1a1a1a; }
    .logo { width: 50px; height: 50px; margin-right: 8px; }
    .header h1 { display: flex; align-items: center; margin: 0; }
    .container { position:relative; display:inline-block; max-width:600px; margin:20px auto; }
    img { width:100%; border:2px solid #fff; border-radius:12px; }
    button { padding:12px 20px; margin:8px; font-size:16px; border:none; border-radius:50px; background:#ff4d4d; color:white; cursor:pointer; }
    .mixer, .feedback { padding:15px; background:#222; margin:10px; border-radius:12px; }
    .color-swatch { width:55px; height:55px; margin:6px; border:3px solid white; border-radius:12px; display:inline-block; cursor:pointer; }
  </style>
</head>
<body>
  <div class="header">
    <h1>
      <img src="https://i.ibb.co.com/0jZ7Z7Z/colorless-logo.png" class="logo" alt="Colorless Logo">
      Colorless
    </h1>
  </div>

  <input type="file" id="fileInput" accept="image/*" style="display:none;">
  <button onclick="document.getElementById('fileInput').click()">📁 Upload Photo</button>

  <div class="container">
    <img id="mainImage" style="display:none;">
  </div>

  <div class="mixer">
    <h3>🎨 Color Mixer</h3>
    <div id="palette"></div>
    <div id="mixedResult" style="margin:20px 0; min-height:120px;"></div>
    <button onclick="clearMix()">Clear Mixer</button>
  </div>

  <div class="feedback">
    <h3>💬 Send Feedback</h3>
    <textarea id="feedbackText" placeholder="How can we make Colorless better?" style="width:90%; height:80px; background:#333; color:white; border:none; border-radius:8px; padding:10px;"></textarea>
    <button onclick="sendFeedback()">Send Feedback</button>
  </div>

  <script>
    let pickedColors = [];

    const paletteColors = [
      {name:"Red", hex:"#FF0000"}, {name:"Cadmium Red", hex:"#E30000"},
      {name:"Yellow", hex:"#FFFF00"}, {name:"Orange", hex:"#FF7F00"},
      {name:"Green", hex:"#00FF00"}, {name:"Blue", hex:"#0000FF"},
      {name:"Ultramarine", hex:"#3F00FF"}, {name:"Purple", hex:"#800080"},
      {name:"Pink", hex:"#FF69B4"}, {name:"Brown", hex:"#8B4513"},
      {name:"Black", hex:"#000000"}, {name:"White", hex:"#FFFFFF"},
      {name:"Gray", hex:"#808080"}
    ];

    const paletteDiv = document.getElementById('palette');
    paletteColors.forEach(c => {
      const sw = document.createElement('div');
      sw.className = 'color-swatch';
      sw.style.background = c.hex;
      sw.title = c.name;
      sw.onclick = () => addToMix(c);
      paletteDiv.appendChild(sw);
    });

    function addToMix(c) {
      pickedColors.push(c);
      if (pickedColors.length > 8) pickedColors.shift();
      updateMix();
    }

    function updateMix() {
      const result = document.getElementById('mixedResult');
      if (pickedColors.length === 0) {
        result.innerHTML = '<p>Tap swatches to mix colors</p>';
        return;
      }

      let r = 0, g = 0, b = 0;
      pickedColors.forEach(c => {
        const h = c.hex.replace('#','');
        r += parseInt(h.substr(0,2), 16);
        g += parseInt(h.substr(2,2), 16);
        b += parseInt(h.substr(4,2), 16);
      });

      r = Math.floor(r / pickedColors.length);
      g = Math.floor(g / pickedColors.length);
      b = Math.floor(b / pickedColors.length);

      const hex = '#' + [r,g,b].map(x => x.toString(16).padStart(2,'0')).join('').toUpperCase();
      const mixedName = getMixedColorName(r, g, b);

      result.innerHTML = `
        <div class="color-swatch" style="background:${hex}; width:110px; height:110px; display:block; margin:10px auto;"></div>
        <strong>${hex}</strong><br>
        <small>${mixedName}</small>
      `;
    }

    function getMixedColorName(r, g, b) {
      if (r > 200 && g < 110 && b < 110) return "Reddish";
      if (g > 180 && r < 120 && b < 120) return "Greenish";
      if (b > 180 && r < 120 && g < 120) return "Bluish";
      if (r > 200 && g > 170 && b < 100) return "Yellowish";
      if (r > 160 && g < 100 && b > 140) return "Purplish";
      if (r > 200 && g > 100 && b < 80) return "Orange";
      if (r < 60 && g < 60 && b < 60) return "Dark";
      if (r > 220 && g > 220 && b > 220) return "Light / White";
      return "Mixed Color";
    }

    function clearMix() {
      pickedColors = [];
      updateMix();
    }

    function sendFeedback() {
      const text = document.getElementById('feedbackText').value.trim();
      if (!text) {
        alert("Please write something before sending.");
        return;
      }

      // Replace with your Formspree endpoint
      fetch('https://formspree.io/f/xjgqpqav', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ 
          feedback: text,
          page: "Main Page"
        })
      }).then(() => {
        alert("✅ Feedback sent! Thank you.");
        document.getElementById('feedbackText').value = '';
      }).catch(() => {
        alert("Feedback saved locally (offline mode).");
      });
    }

    // Upload → Go to Editor
    document.getElementById('fileInput').addEventListener('change', e => {
      const file = e.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = ev => {
        localStorage.setItem('colorlessImage', ev.target.result);
        window.location.href = 'editor.html';
      };
      reader.readAsDataURL(file);
    });
  </script>
</body>
</html>
