<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Colorless</title>
  <style>
    body { margin:0; font-family: Arial; background: #111; color: white; text-align:center; padding:10px; }
    .header { display:flex; justify-content:space-between; align-items:center; padding:10px; background:#1a1a1a; }
    .container { position:relative; display:inline-block; max-width:600px; margin:20px auto; }
    img { width:100%; border:2px solid #fff; border-radius:12px; }
    button { padding:12px 20px; margin:8px; font-size:16px; border:none; border-radius:50px; background:#ff4d4d; color:white; }
    .info, .mixer { padding:15px; background:#222; margin:10px; border-radius:12px; }
    .color-swatch { width:55px; height:55px; margin:6px; border:3px solid white; border-radius:12px; display:inline-block; cursor:pointer; }
  </style>
</head>
<body>
  <div class="header">
    <h1>Colorless</h1>
  </div>

  <input type="file" id="fileInput" accept="image/*" style="display:none;">
  <button onclick="document.getElementById('fileInput').click()">📁 Upload Photo</button>

  <div class="container">
    <img id="mainImage" style="display:none;">
  </div>

  <div class="info">
    <div id="colorBox" class="color-swatch" style="width:90px;height:90px"></div>
    <h2 id="hex">#------</h2>
    <p id="rgb">RGB: ---</p>
    <p id="name">Color: ---</p>
  </div>

  <div class="mixer">
    <h3>🎨 Color Mixer</h3>
    <div id="palette"></div>
  </div>

  <script>
    let currentImageData = null;

    const paletteColors = ["#FF0000","#FFFF00","#00FF00","#0000FF","#FF00FF","#FFA500"];
    const paletteDiv = document.getElementById('palette');
    paletteColors.forEach(hex => {
      const sw = document.createElement('div');
      sw.className = 'color-swatch';
      sw.style.background = hex;
      paletteDiv.appendChild(sw);
    });

    document.getElementById('fileInput').addEventListener('change', e => {
      const file = e.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = ev => {
        currentImageData = ev.target.result;
        document.getElementById('mainImage').src = currentImageData;
        document.getElementById('mainImage').style.display = 'block';

        // Save image and go to editor
        localStorage.setItem('colorlessImage', currentImageData);
        window.location.href = 'editor.html';
      };
      reader.readAsDataURL(file);
    });
  </script>
</body>
</html>
