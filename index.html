<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ChromaArt</title>
  <style>
    body { margin:0; font-family: Arial; background: #111; color: white; text-align:center; padding:10px; }
    img, video { width:100%; max-width:600px; border:2px solid #fff; border-radius:12px; }
    .info, .mixer { padding:15px; background:#222; margin:10px; border-radius:12px; }
    button { padding:12px 20px; margin:8px; font-size:16px; border:none; border-radius:50px; background:#ff4d4d; color:white; }
    .color-box { width:70px; height:70px; margin:8px auto; border:3px solid white; border-radius:12px; display:inline-block; }
  </style>
</head>
<body>
  <h1>🎨 ChromaArt</h1>
  <p>Color Identifier & Mixer for Artists</p>

  <input type="file" id="fileInput" accept="image/*" style="display:none;">
  <button onclick="document.getElementById('fileInput').click()">📁 Upload Photo</button>
  <button onclick="startCamera()">📸 Take Photo</button>

  <video id="video" autoplay playsinline style="display:none;"></video>
  <canvas id="canvas" style="display:none;"></canvas>
  <img id="uploadedImage" style="display:none;" onclick="pickColor(event)">

  <div class="info">
    <div id="colorBox" class="color-box"></div>
    <h2 id="hex">#------</h2>
    <p id="rgb">RGB: ---</p>
    <p id="name">Color: ---</p>
  </div>

  <div class="mixer">
    <h3>🎨 Color Mixer</h3>
    <div id="mixedColors"></div>
    <button onclick="mixColors()">Mix Selected Colors</button>
  </div>

  <script>
    let pickedColors = [];
    const fileInput = document.getElementById('fileInput');
    const img = document.getElementById('uploadedImage');
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    fileInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = function(ev) {
          img.src = ev.target.result;
          img.style.display = 'block';
          video.style.display = 'none';
          pickedColors = [];
        };
        reader.readAsDataURL(file);
      }
    });

    function pickColor(e) {
      canvas.width = img.width;
      canvas.height = img.height;
      ctx.drawImage(img, 0, 0);

      const rect = img.getBoundingClientRect();
      const x = Math.floor((e.clientX - rect.left) * (img.width / rect.width));
      const y = Math.floor((e.clientY - rect.top) * (img.height / rect.height));

      const pixel = ctx.getImageData(x, y, 1, 1).data;
      const r = pixel[0], g = pixel[1], b = pixel[2];
      const hex = '#' + ((1 << 24) + (r << 16) + (g << 8) + b).toString(16).slice(1).toUpperCase();

      document.getElementById('colorBox').style.backgroundColor = hex;
      document.getElementById('hex').textContent = hex;
      document.getElementById('rgb').textContent = `RGB: ${r}, ${g}, ${b}`;

      let name = getBasicColorName(r, g, b);
      document.getElementById('name').textContent = "Color: " + name;

      pickedColors.push({r, g, b, hex, name});
      if (pickedColors.length > 5) pickedColors.shift();
    }

    function getBasicColorName(r, g, b) {
      if (r > 200 && g < 100 && b < 100) return "Red";
      if (g > 180 && r < 120 && b < 120) return "Green";
      if (b > 180 && r < 120 && g < 120) return "Blue";
      if (r > 200 && g > 180 && b < 100) return "Yellow";
      if (r > 180 && g < 100 && b > 150) return "Purple";
      if (r > 200 && g > 200 && b > 200) return "White";
      if (r < 50 && g < 50 && b < 50) return "Black";
      return "Custom";
    }

    function mixColors() {
      if (pickedColors.length < 2) {
        alert("Pick at least 2 colors first by tapping on the image!");
        return;
      }
      let r = 0, g = 0, b = 0;
      pickedColors.forEach(c => { r += c.r; g += c.g; b += c.b; });
      r = Math.floor(r / pickedColors.length);
      g = Math.floor(g / pickedColors.length);
      b = Math.floor(b / pickedColors.length);
      const hex = '#' + ((1 << 24) + (r << 16) + (g << 8) + b).toString(16).slice(1).toUpperCase();

      const mixerDiv = document.getElementById('mixedColors');
      mixerDiv.innerHTML = `<div class="color-box" style="background:${hex}"></div><p>Mixed: ${hex}</p>`;
    }

    function startCamera() {
      // ... (camera code same as before)
      alert("Camera mode coming in next update. Use Gallery for now.");
    }
  </script>
</body>
</html>
